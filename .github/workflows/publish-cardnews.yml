# (B) 클라우드 발행 — GitHub Actions. 맥/인터넷과 무관하게 GitHub 서버가 예약대로 발행.
# 설치 위치: kdvol.github.io/.github/workflows/publish-cardnews.yml
# 큐: kdvol.github.io/_queue/<slug>.json + 발행 HTML(cardnews/...) 커밋 → 이 워크플로가 소비.
name: publish-cardnews

on:
  schedule:
    # 15분 주기 재시도 — 예약 실패 시에도 1시간 내 발행 보장(맥 꺼져 있어도 클라우드가 처리).
    # cron은 UTC. KST = UTC+9. 오전창 09:00~14:45 KST, 오후창 15:00~19:45 KST.
    - cron: "0,15,30,45 0-5 * * *"   # 09:00~14:45 KST (오전 발행 + 15분 재시도)
    - cron: "0,15,30,45 6-10 * * *"  # 15:00~19:45 KST (오후 발행 + 15분 재시도)
  workflow_dispatch:               # 수동 실행(첫 테스트용)
    inputs:
      only:
        description: "특정 큐 slug만 (비우면 due 전부)"
        required: false
      dry_run:
        description: "true면 IG 미게시(웹만) — 안전 테스트"
        required: false
        default: "false"
      selftest:
        description: "true면 무발행 하네스 검증만"
        required: false
        default: "false"

concurrency:                       # 겹침 방지(중복 발행 방어)
  group: publish-cardnews
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write              # 발행 결과(done/ 이동·index 갱신) 커밋용
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright pillow requests boto3 python-dotenv
          python -m playwright install --with-deps chromium

      - name: Write config.env from secrets
        run: |
          mkdir -p ig_pipeline
          cat > ig_pipeline/config.env <<EOF
          INSTAGRAM_ACCESS_TOKEN=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_BUSINESS_ACCOUNT_ID=${{ secrets.INSTAGRAM_BUSINESS_ACCOUNT_ID }}
          FB_APP_ID=${{ secrets.FB_APP_ID }}
          FB_APP_SECRET=${{ secrets.FB_APP_SECRET }}
          EOF
        # ⚠️ deploy.py는 ~/instagram_pipeline/ 경로를 가정하므로, 런북 2-b(모듈 벤더링) 필요.

      - name: Run publish queue
        env:
          KDVOL_ROOT: ${{ github.workspace }}
          INSTAGRAM_PIPELINE: ${{ github.workspace }}/ig_pipeline
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: |
          ARGS=""
          [ -n "${{ github.event.inputs.only }}" ] && ARGS="$ARGS --only ${{ github.event.inputs.only }}"
          [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
          [ "${{ github.event.inputs.selftest }}" = "true" ] && ARGS="--selftest"
          python ci/publish_from_queue.py $ARGS

      - name: Commit publish results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}   # auto_evolve/entity_discovery LLM 승격에 필요
        run: |
          git config user.name "soonsal-bot"
          git config user.email "bot@soonsal.com"
          python scripts/generate_seo.py || true
          git add -A
          git diff --cached --quiet || git commit -m "cardnews auto-publish [skip ci]"
          # 동시 push 안전: pull --rebase(충돌 시 merge -X ours) 후 push, 백오프 재시도
          for i in 1 2 3 4 5 6; do
            git pull --rebase origin main || { git rebase --abort 2>/dev/null || true; \
              git pull --no-rebase -X ours -m "merge origin (keep local)" origin main || true; }
            git push origin main && break
            echo "push 경합 — 재시도 $i/6"; sleep $((i*3))
          done
